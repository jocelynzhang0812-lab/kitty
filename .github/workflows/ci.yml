name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kitty_test
          POSTGRES_USER: kitty
          POSTGRES_PASSWORD: kitty
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kitty -d kitty_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      KITTY_TEST_POSTGRES_URL: postgresql://kitty:kitty@127.0.0.1:5432/kitty_test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: kitty-runtime

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install --no-deps -e .

      - name: Tests
        run: python -m unittest discover -s tests -v
